<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KonturAutoNC — Lisans Yonetimi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0b0d0f; color: #e8e8e8; font-family: 'Courier New', monospace; min-height: 100vh; }

/* LOGIN */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.login-box {
  background: #13161a; border: 1px solid #2a2d33; border-radius: 8px;
  padding: 32px; width: 100%; max-width: 340px; text-align: center;
}

/* MAIN */
#main-screen { display: none; padding: 16px; max-width: 1000px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #1a1d22; }
.header h1 { color: #00aaff; font-size: 16px; }
.logout-btn { background: #1a1d22; border: 1px solid #2a2d33; color: #666; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 11px; }
.logout-btn:hover { border-color: #e74c3c; color: #e74c3c; }

.warning { background: #1a1200; border: 1px solid #ff9500; border-radius: 4px; padding: 8px 12px; color: #ff9500; font-size: 10px; margin-bottom: 16px; }

.tabs { display: flex; gap: 6px; margin-bottom: 20px; }
.tab-btn { padding: 8px 16px; background: #1a1d22; border: 1px solid #2a2d33; color: #666; border-radius: 4px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; }
.tab-btn.active { background: #0d2040; border-color: #00aaff; color: #00aaff; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:600px) { .grid2 { grid-template-columns: 1fr; } }

.card { background: #13161a; border: 1px solid #2a2d33; border-radius: 8px; padding: 18px; margin-bottom: 16px; }
.card-title { color: #00aaff; font-size: 12px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #1a1d22; }

label { display: block; color: #aaa; font-size: 10px; margin-bottom: 4px; }
input, select { width: 100%; padding: 8px 10px; background: #0d0f12; border: 1px solid #2a2d33; color: #e8e8e8; font-family: 'Courier New', monospace; font-size: 12px; border-radius: 4px; margin-bottom: 10px; outline: none; }
input:focus, select:focus { border-color: #00aaff; }

.dur-btns { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.dur-btn { padding: 5px 8px; background: #1a1d22; border: 1px solid #2a2d33; color: #888; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: 'Courier New', monospace; }
.dur-btn:hover { border-color: #00aaff; color: #e8e8e8; }

.btn { width: 100%; padding: 9px; border: none; border-radius: 4px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; margin-bottom: 6px; }
.btn-blue { background: #00aaff; color: #000; }
.btn-blue:hover { background: #0088cc; }
.btn-blue:disabled { background: #1a1d22; color: #444; cursor: not-allowed; }
.btn-green { background: #27ae60; color: #fff; }
.btn-green:hover { background: #219a52; }
.btn-red { background: #2a0000; color: #e74c3c; border: 1px solid #e74c3c; }
.btn-red:hover { background: #e74c3c; color: #fff; }
.btn-gray { background: #1a1d22; color: #888; border: 1px solid #2a2d33; }
.btn-gray:hover { border-color: #666; color: #e8e8e8; }

.result-box { background: #0a2a0a; border: 1px solid #27ae60; border-radius: 4px; padding: 10px; margin-top: 8px; display: none; font-size: 11px; color: #27ae60; }
.err-box { background: #2a0000; border: 1px solid #e74c3c; border-radius: 4px; padding: 10px; margin-top: 8px; display: none; font-size: 11px; color: #e74c3c; }

/* MUSTERI KARTI */
.cust-card { background: #0d0f12; border: 1px solid #1a1d22; border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; }
.cust-card:hover { border-color: #2a2d33; }
.cust-name { color: #00aaff; font-size: 12px; margin-bottom: 4px; }
.cust-user { color: #888; font-size: 10px; margin-bottom: 2px; }
.cust-device { color: #ff9500; font-size: 10px; margin-bottom: 6px; }
.cust-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.cust-btn { padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: 'Courier New', monospace; border: 1px solid; }
.cust-btn-edit { background: #0d2040; border-color: #00aaff; color: #00aaff; }
.cust-btn-edit:hover { background: #00aaff; color: #000; }
.cust-btn-del { background: #2a0000; border-color: #e74c3c; color: #e74c3c; }
.cust-btn-del:hover { background: #e74c3c; color: #fff; }

/* LISANS KARTI */
.lic-card { background: #0d0f12; border: 1px solid #1a1d22; border-radius: 6px; padding: 12px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.lic-left { flex: 1; }
.lic-name { color: #00aaff; font-size: 11px; }
.lic-code { color: #27ae60; font-size: 10px; letter-spacing: 1px; margin: 2px 0; }
.lic-meta { color: #444; font-size: 9px; }
.lic-right { text-align: right; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 9px; font-weight: bold; }
.badge-ok { background: #0a2a0a; color: #27ae60; border: 1px solid #27ae60; }
.badge-warn { background: #2a1500; color: #ff9500; border: 1px solid #ff9500; }
.badge-exp { background: #2a0000; color: #e74c3c; border: 1px solid #e74c3c; }
.badge-off { background: #1a1d22; color: #555; border: 1px solid #333; }

.search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.search-bar input { margin-bottom: 0; flex: 1; }
.refresh-btn { padding: 8px 12px; background: #1a1d22; border: 1px solid #2a2d33; color: #888; border-radius: 4px; cursor: pointer; white-space: nowrap; font-size: 12px; }
.refresh-btn:hover { border-color: #00aaff; color: #e8e8e8; }

.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
@media(max-width:500px) { .stat-grid { grid-template-columns: repeat(2,1fr); } }
.stat-box { background: #0d0f12; border: 1px solid #1a1d22; border-radius: 6px; padding: 12px; text-align: center; }
.stat-val { font-size: 22px; font-weight: bold; }
.stat-lbl { color: #444; font-size: 9px; margin-top: 3px; }

/* MODAL */
.modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
.modal-bg.open { display: flex; }
.modal { background: #13161a; border: 1px solid #2a2d33; border-radius: 8px; padding: 24px; width: 90%; max-width: 420px; }
.modal-title { color: #00aaff; font-size: 13px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; margin-top: 4px; }
.modal-actions .btn { margin-bottom: 0; }

h2 { color: #00aaff; font-size: 14px; margin-bottom: 16px; }
.no-data { color: #333; font-size: 11px; text-align: center; padding: 20px; }
</style>
</head>
<body>

<!-- GİRİŞ -->
<div id="login-screen">
  <div class="login-box">
    <div style="color:#00aaff;font-size:20px;font-weight:bold;margin-bottom:4px;">⚙ KonturAutoNC</div>
    <div style="color:#444;font-size:10px;margin-bottom:24px;">Yonetim Paneli</div>
    <label>Kullanici Adi</label>
    <input type="text" id="admin-user" placeholder="admin" />
    <label>Sifre</label>
    <input type="password" id="admin-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()" />
    <div id="login-err" style="color:#e74c3c;font-size:10px;min-height:14px;margin-bottom:10px;"></div>
    <button class="btn btn-blue" onclick="adminLogin()">GİRİŞ YAP</button>
    <div style="color:#1a1d22;font-size:9px;margin-top:12px;">Sadece yetkili kullanim</div>
  </div>
</div>

<!-- ANA PANEL -->
<div id="main-screen">
  <div class="header">
    <h1>⚙ KonturAutoNC — Lisans Yonetimi</h1>
    <button class="logout-btn" onclick="adminLogout()">Cikis</button>
  </div>
  <div class="warning">⚠ Bu paneli musterilere gosterme!</div>

  <div class="stat-grid" id="stats-grid"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('customers')">Musteriler</button>
    <button class="tab-btn" onclick="switchTab('licenses')">Lisanslar</button>
    <button class="tab-btn" onclick="switchTab('new-customer')">+ Yeni Musteri</button>
    <button class="tab-btn" onclick="switchTab('new-license')">+ Yeni Lisans</button>
  </div>

  <!-- MÜŞTERİLER -->
  <div id="tab-customers" class="tab-content active">
    <div class="search-bar">
      <input type="text" id="cust-search" placeholder="Ara..." oninput="renderCustomers()" />
      <button class="refresh-btn" onclick="loadAll()">↻</button>
    </div>
    <div id="customers-list"><div class="no-data">Yukleniyor...</div></div>
  </div>

  <!-- LİSANSLAR -->
  <div id="tab-licenses" class="tab-content">
    <div class="search-bar">
      <input type="text" id="lic-search" placeholder="Ara..." oninput="renderLicenses()" />
      <button class="refresh-btn" onclick="loadAll()">↻</button>
    </div>
    <div id="licenses-list"><div class="no-data">Yukleniyor...</div></div>
  </div>

  <!-- YENİ MÜŞTERİ -->
  <div id="tab-new-customer" class="tab-content">
    <div class="card" style="max-width:420px;">
      <div class="card-title">Yeni Musteri Olustur</div>
      <label>Musteri Adi / Firma</label>
      <input type="text" id="nc-name" placeholder="orn: Ahmet Yilmaz / ABC Makina" />
      <label>Kullanici Adi (uygulama girisi icin)</label>
      <input type="text" id="nc-user" placeholder="orn: ahmetyilmaz" oninput="this.value=this.value.toLowerCase().replace(/\s/g,'')" />
      <label>Sifre</label>
      <input type="password" id="nc-pass" placeholder="Guclu bir sifre girin" />
      <label>Cihaz ID (opsiyonel, sonra da eklenebilir)</label>
      <input type="text" id="nc-device" placeholder="orn: KNT-XXXX-XXXX-XXXX" oninput="this.value=this.value.toUpperCase()" />
      <button class="btn btn-blue" id="nc-btn" onclick="createCustomer()">MUSTERİ OLUSTUR</button>
      <div id="nc-result" class="result-box"></div>
      <div id="nc-err" class="err-box"></div>
    </div>
  </div>

  <!-- YENİ LİSANS -->
  <div id="tab-new-license" class="tab-content">
    <div class="card" style="max-width:420px;">
      <div class="card-title">Yeni Lisans Olustur</div>
      <label>Musteri Sec</label>
      <select id="nl-customer"><option value="">-- Musteri sec --</option></select>
      <label>Lisans Suresi (gun)</label>
      <input type="number" id="nl-days" value="365" min="1" max="9999" />
      <div class="dur-btns">
        <button class="dur-btn" onclick="document.getElementById('nl-days').value=30">30 gun</button>
        <button class="dur-btn" onclick="document.getElementById('nl-days').value=90">90 gun</button>
        <button class="dur-btn" onclick="document.getElementById('nl-days').value=180">6 ay</button>
        <button class="dur-btn" onclick="document.getElementById('nl-days').value=365">1 yil</button>
        <button class="dur-btn" onclick="document.getElementById('nl-days').value=730">2 yil</button>
      </div>
      <button class="btn btn-blue" id="nl-btn" onclick="createLicense()">LİSANS OLUSTUR</button>
      <div id="nl-result" class="result-box"></div>
      <div id="nl-err" class="err-box"></div>
    </div>
  </div>
</div>

<!-- DÜZENLE MODALİ -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <div class="modal-title" id="edit-modal-title">Duzenle</div>
    <div id="edit-modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-blue" id="edit-modal-save" onclick="saveEdit()">Kaydet</button>
      <button class="btn btn-gray" onclick="closeModal()">Iptal</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lgujxdnomefdcdowdagh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxndWp4ZG5vbWVmZGNkb3dkYWdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTIwMTcsImV4cCI6MjA5MjAyODAxN30.yqkk8ODYryTHHumkHlhXZbjyxZHDyPTJ9Ddh_i6KbWE';
const ADMIN_USER = 'Mert';
const ADMIN_PASS_HASH = simpleHash(simpleHash('Mrf13579+') + 'ADMIN_SALT_KNT');

function simpleHash(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = (h * 0x01000193) >>> 0; }
  return h.toString(16).padStart(8, '0');
}

function hashPassword(pass) {
  return simpleHash(simpleHash(pass) + 'KNT2024SALT' + simpleHash(pass.split('').reverse().join('')));
}

let allCustomers = [], allLicenses = [];
let editContext = {};

// ---- ADMIN GİRİŞ ----
function adminLogin() {
  const u = document.getElementById('admin-user').value.trim();
  const p = document.getElementById('admin-pass').value;
  const err = document.getElementById('login-err');
  const inputHash = simpleHash(simpleHash(p) + 'ADMIN_SALT_KNT');

  if (u === ADMIN_USER && inputHash === ADMIN_PASS_HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    loadAll();
  } else {
    err.textContent = 'Kullanici adi veya sifre yanlis.';
  }
}

function adminLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('admin-pass').value = '';
}

// ---- API ----
async function apiGet(path) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  if (!res.ok) return null;
  return res.json();
}

async function apiPost(path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
  return { ok: res.ok, data: res.ok ? await res.json() : await res.text() };
}

async function apiPatch(path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.ok;
}

async function apiDelete(path) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
  return res.ok;
}

// ---- VERİ YUKLE ----
async function loadAll() {
  const [custs, lics] = await Promise.all([
    apiGet('customers?select=*&order=created_at.desc'),
    apiGet('licenses?select=*&order=created_at.desc')
  ]);
  allCustomers = custs || [];
  allLicenses = lics || [];
  renderStats();
  renderCustomers();
  renderLicenses();
  populateCustomerSelect();
}

function populateCustomerSelect() {
  const sel = document.getElementById('nl-customer');
  sel.innerHTML = '<option value="">-- Musteri sec --</option>';
  allCustomers.forEach(c => {
    sel.innerHTML += '<option value="' + c.id + '">' + c.username + ' — ' + (c.customer_name || '?') + '</option>';
  });
}

// ---- İSTATİSTİKLER ----
function renderStats() {
  const now = Date.now();
  const active = allLicenses.filter(l => l.active && new Date(l.expires_at) > now).length;
  const expired = allLicenses.filter(l => !l.active || new Date(l.expires_at) <= now).length;
  const expiring = allLicenses.filter(l => {
    if (!l.active) return false;
    const d = Math.ceil((new Date(l.expires_at) - now) / 86400000);
    return d > 0 && d <= 30;
  }).length;

  document.getElementById('stats-grid').innerHTML =
    statBox(allCustomers.length, 'Musteri', '#aaa') +
    statBox(active, 'Aktif Lisans', '#27ae60') +
    statBox(expiring, '30 Gun Doluyor', '#ff9500') +
    statBox(expired, 'Dolmus/Iptal', '#e74c3c');
}

function statBox(v, l, c) {
  return '<div class="stat-box"><div class="stat-val" style="color:' + c + '">' + v + '</div><div class="stat-lbl">' + l + '</div></div>';
}

// ---- MÜŞTERİLER ----
function renderCustomers() {
  const q = (document.getElementById('cust-search').value || '').toLowerCase();
  const list = q ? allCustomers.filter(c => (c.username + c.customer_name + (c.device_id || '')).toLowerCase().includes(q)) : allCustomers;
  const container = document.getElementById('customers-list');
  if (!list.length) { container.innerHTML = '<div class="no-data">Musteri bulunamadi.</div>'; return; }

  const licsMap = {};
  allLicenses.forEach(l => { if (l.customer_id) licsMap[l.customer_id] = l; });

  container.innerHTML = list.map(c => {
    const lic = licsMap[c.id];
    const now = Date.now();
    let licInfo = '<span style="color:#333;font-size:9px;">Lisans yok</span>';
    if (lic) {
      const days = Math.ceil((new Date(lic.expires_at) - now) / 86400000);
      const col = !lic.active || days <= 0 ? '#e74c3c' : days <= 30 ? '#ff9500' : '#27ae60';
      licInfo = '<span style="color:' + col + ';font-size:10px;">' + (days > 0 && lic.active ? days + ' gun kaldi' : 'Suresi doldu') + '</span>';
    }
    return '<div class="cust-card">'
      + '<div class="cust-name">' + (c.customer_name || c.username) + '</div>'
      + '<div class="cust-user">@' + c.username + ' &nbsp;|&nbsp; ' + licInfo + '</div>'
      + '<div class="cust-device">' + (c.device_id || 'Cihaz baglanmamis') + '</div>'
      + '<div class="cust-actions">'
        + '<button class="cust-btn cust-btn-edit" onclick="editCustomer(' + c.id + ')">Duzenle</button>'
        + '<button class="cust-btn cust-btn-edit" style="border-color:#27ae60;color:#27ae60;" onclick="editCustomerDevice(' + c.id + ')">Cihaz Degistir</button>'
        + '<button class="cust-btn cust-btn-del" onclick="deleteCustomer(' + c.id + ')">Sil</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ---- LİSANSLAR ----
function renderLicenses() {
  const q = (document.getElementById('lic-search').value || '').toLowerCase();
  const now = Date.now();
  const list = q ? allLicenses.filter(l => (l.customer_name + l.code + (l.device_id || '')).toLowerCase().includes(q)) : allLicenses;
  const container = document.getElementById('licenses-list');
  if (!list.length) { container.innerHTML = '<div class="no-data">Lisans bulunamadi.</div>'; return; }

  container.innerHTML = list.map(l => {
    const days = Math.ceil((new Date(l.expires_at) - now) / 86400000);
    let badge = '';
    if (!l.active) badge = '<span class="badge badge-off">IPTAL</span>';
    else if (days <= 0) badge = '<span class="badge badge-exp">DOLDU</span>';
    else if (days <= 30) badge = '<span class="badge badge-warn">' + days + ' GUN</span>';
    else badge = '<span class="badge badge-ok">' + days + ' GUN</span>';

    const cust = allCustomers.find(c => c.id === l.customer_id);
    return '<div class="lic-card">'
      + '<div class="lic-left">'
        + '<div class="lic-name">' + l.customer_name + (cust ? ' (@' + cust.username + ')' : '') + '</div>'
        + '<div class="lic-code">' + l.code + '</div>'
        + '<div class="lic-meta">Bitis: ' + new Date(l.expires_at).toLocaleDateString('tr-TR') + '</div>'
      + '</div>'
      + '<div class="lic-right">'
        + badge
        + '<br><div style="display:flex;flex-direction:column;gap:4px;margin-top:6px;">'
        + '<button class="cust-btn cust-btn-edit" onclick="editLicense(' + l.id + ')">Sure Duzenle</button>'
        + (l.active && days > 0 ? '<button class="cust-btn cust-btn-del" onclick="revokeLicense(' + l.id + ')">Iptal</button>' : '')
        + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

// ---- YENİ MÜŞTERİ ----
async function createCustomer() {
  const name = document.getElementById('nc-name').value.trim();
  const user = document.getElementById('nc-user').value.trim();
  const pass = document.getElementById('nc-pass').value;
  const device = document.getElementById('nc-device').value.trim() || null;
  const btn = document.getElementById('nc-btn');
  const res = document.getElementById('nc-result');
  const err = document.getElementById('nc-err');

  res.style.display = 'none'; err.style.display = 'none';

  if (!name || !user || !pass) { err.textContent = 'Tum alanlari doldurun.'; err.style.display = 'block'; return; }
  if (pass.length < 6) { err.textContent = 'Sifre en az 6 karakter olmali.'; err.style.display = 'block'; return; }

  btn.textContent = 'Kaydediliyor...'; btn.disabled = true;

  const r = await apiPost('customers', {
    customer_name: name,
    username: user,
    password_hash: hashPassword(pass),
    device_id: device
  });

  btn.textContent = 'MUSTERİ OLUSTUR'; btn.disabled = false;

  if (r.ok) {
    res.textContent = 'Musteri olusturuldu: @' + user;
    res.style.display = 'block';
    document.getElementById('nc-name').value = '';
    document.getElementById('nc-user').value = '';
    document.getElementById('nc-pass').value = '';
    document.getElementById('nc-device').value = '';
    loadAll();
  } else {
    err.textContent = 'Hata: ' + (typeof r.data === 'string' ? r.data : JSON.stringify(r.data));
    err.style.display = 'block';
  }
}

// ---- YENİ LİSANS ----
function genCode() {
  const c = '0123456789ABCDEF';
  let code = '';
  for (let i = 0; i < 16; i++) {
    if (i > 0 && i % 4 === 0) code += '-';
    code += c[Math.floor(Math.random() * 16)];
  }
  return code;
}

async function createLicense() {
  const custId = document.getElementById('nl-customer').value;
  const days = parseInt(document.getElementById('nl-days').value);
  const btn = document.getElementById('nl-btn');
  const res = document.getElementById('nl-result');
  const err = document.getElementById('nl-err');

  res.style.display = 'none'; err.style.display = 'none';

  if (!custId) { err.textContent = 'Musteri secin.'; err.style.display = 'block'; return; }
  if (!days || days < 1) { err.textContent = 'Gecerli sure girin.'; err.style.display = 'block'; return; }

  const cust = allCustomers.find(c => c.id == custId);
  if (!cust) return;

  btn.textContent = 'Kaydediliyor...'; btn.disabled = true;

  const code = genCode();
  const expiresAt = new Date(Date.now() + days * 86400000).toISOString();

  const r = await apiPost('licenses', {
    device_id: cust.device_id || 'UNBOUND',
    customer_name: cust.customer_name || cust.username,
    code: code,
    expires_at: expiresAt,
    active: true,
    customer_id: parseInt(custId)
  });

  btn.textContent = 'LİSANS OLUSTUR'; btn.disabled = false;

  if (r.ok) {
    res.textContent = 'Lisans olusturuldu! Kod: ' + code + ' | Bitis: ' + new Date(expiresAt).toLocaleDateString('tr-TR');
    res.style.display = 'block';
    loadAll();
  } else {
    err.textContent = 'Hata: ' + JSON.stringify(r.data);
    err.style.display = 'block';
  }
}

// ---- DÜZENLE ----
function editCustomer(id) {
  const c = allCustomers.find(x => x.id === id);
  if (!c) return;
  editContext = { type: 'customer', id };
  document.getElementById('edit-modal-title').textContent = 'Musteri Duzenle';
  document.getElementById('edit-modal-body').innerHTML =
    '<label>Musteri Adi</label><input type="text" id="em-name" value="' + (c.customer_name || '') + '" />'
    + '<label>Kullanici Adi</label><input type="text" id="em-user" value="' + c.username + '" />'
    + '<label>Yeni Sifre (bos birak = degistirme)</label><input type="password" id="em-pass" placeholder="Yeni sifre..." />';
  document.getElementById('edit-modal').classList.add('open');
}

function editCustomerDevice(id) {
  const c = allCustomers.find(x => x.id === id);
  if (!c) return;
  editContext = { type: 'device', id };
  document.getElementById('edit-modal-title').textContent = 'Cihaz ID Degistir';
  document.getElementById('edit-modal-body').innerHTML =
    '<div style="color:#888;font-size:10px;margin-bottom:8px;">Mevcut: <span style="color:#ff9500;">' + (c.device_id || 'Yok') + '</span></div>'
    + '<label>Yeni Cihaz ID (bos birak = sil/sifirla)</label>'
    + '<input type="text" id="em-device" value="' + (c.device_id || '') + '" oninput="this.value=this.value.toUpperCase()" />';
  document.getElementById('edit-modal').classList.add('open');
}

function editLicense(id) {
  const l = allLicenses.find(x => x.id === id);
  if (!l) return;
  editContext = { type: 'license', id };
  const expiresDate = new Date(l.expires_at).toISOString().split('T')[0];
  document.getElementById('edit-modal-title').textContent = 'Lisans Suresi Duzenle';
  document.getElementById('edit-modal-body').innerHTML =
    '<div style="color:#888;font-size:10px;margin-bottom:10px;">' + l.customer_name + '</div>'
    + '<label>Bitis Tarihi</label><input type="date" id="em-date" value="' + expiresDate + '" />'
    + '<div class="dur-btns" style="margin-top:-4px;">'
    + '<button class="dur-btn" onclick="addDays(30)">+30 gun</button>'
    + '<button class="dur-btn" onclick="addDays(90)">+90 gun</button>'
    + '<button class="dur-btn" onclick="addDays(180)">+6 ay</button>'
    + '<button class="dur-btn" onclick="addDays(365)">+1 yil</button>'
    + '</div>';
  document.getElementById('edit-modal').classList.add('open');
}

function addDays(n) {
  const inp = document.getElementById('em-date');
  if (!inp) return;
  const d = new Date(inp.value || Date.now());
  d.setDate(d.getDate() + n);
  inp.value = d.toISOString().split('T')[0];
}

async function saveEdit() {
  const { type, id } = editContext;
  let ok = false;

  if (type === 'customer') {
    const name = document.getElementById('em-name').value.trim();
    const user = document.getElementById('em-user').value.trim();
    const pass = document.getElementById('em-pass').value;
    const body = { customer_name: name, username: user };
    if (pass) body.password_hash = hashPassword(pass);
    ok = await apiPatch('customers?id=eq.' + id, body);
  } else if (type === 'device') {
    const device = document.getElementById('em-device').value.trim() || null;
    ok = await apiPatch('customers?id=eq.' + id, { device_id: device });
  } else if (type === 'license') {
    const date = document.getElementById('em-date').value;
    ok = await apiPatch('licenses?id=eq.' + id, { expires_at: new Date(date).toISOString() });
  }

  if (ok) { closeModal(); loadAll(); }
  else alert('Kaydetme basarisiz!');
}

async function revokeLicense(id) {
  if (!confirm('Bu lisansi iptal etmek istediginizden emin misiniz?')) return;
  const ok = await apiPatch('licenses?id=eq.' + id, { active: false });
  if (ok) loadAll();
  else alert('Iptal basarisiz!');
}

async function deleteCustomer(id) {
  if (!confirm('Bu musteriyi ve tum lisanslarini silmek istediginizden emin misiniz?')) return;
  await apiPatch('licenses?customer_id=eq.' + id, { active: false });
  const ok = await apiDelete('customers?id=eq.' + id);
  if (ok) loadAll();
  else alert('Silme basarisiz!');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editContext = {};
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['customers','licenses','new-customer','new-license'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(t => {
    t.classList.toggle('active', t.id === 'tab-' + name);
  });
}
